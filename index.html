<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThesummerBlogs</title>
  <link rel="icon" href="images/blog.png" type="image/png">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link id="theme-style" rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">





<style>

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important; }

  /* 只在 pure 主题时调整字体大小 */
  body.theme-pure .markdown-section {
    font-size: 16px;
  }

  /* 主题选项样式 */

  .theme-option:hover {
  background: #f0f0f0;
  }

  /* 主要内容过渡效果 */

  #main.fade-out {
    opacity: 0;
  }
  #main.fade-in {
    opacity: 1;
  }

  /* 封面图片大小调整 */
  .cover-main img {
    width: 400px;
    height: auto;
    object-fit: cover;
  }
  /* Loading 遮罩 */
  #loading-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
    /* 隐藏遮罩 */
    #loading-overlay.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  /* 加载条样式 液态毛玻璃 */
  .loader-bar {
  width: 60vw;
    height: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 6px;
    overflow: hidden;
    margin: 0 auto;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.3);

  }
  /* 加载条内的进度条 液态毛玻璃 */
  .loader-bar .bar {
    width: 0;
    height: 100%;
    background: linear-gradient(90deg, rgba(66,185,131,0.7), rgba(66,185,255,0.7), rgba(255,255,255,0.5));
    animation: loading-bar 0.3s linear forwards, glass-move 0.6s linear infinite;
    backdrop-filter: blur(4px);
  }
  /* 加载动画 液态毛玻璃 */
  @keyframes loading-bar {
    to { width: 100%; }
  }
  /* 液态毛玻璃动画 */
  @keyframes glass-move {
    0% { filter: blur(2px) brightness(1); }
    50% { filter: blur(6px) brightness(1.2); }
    100% { filter: blur(2px) brightness(1); }
  }


  /* 加载动画  圆圈进度条样式
  .loader-spinner {
    width: 44px;
    height: 44px;
    border: 3px solid #e0e0e0;
    border-top-color: #42b983;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  } */
  /* 加载文字 */
  .loader-text {
    margin-top: 14px;
    color: #999;
    font-size: 13px;
    letter-spacing: 3px;
    animation: pulse-text 1.4s ease-in-out infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes pulse-text {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }

  
/* ===== 导航栏 Logo 样式 ===== */
.custom-navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 50px;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;     /* ← 加这行 */
  padding: 0 20px;
  pointer-events: none;
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  pointer-events: auto;
}

.nav-logo-img {
  height: 32px;
  width: auto;
  border-radius: 6px;
}

.nav-logo-text {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}


/* ===== 玻璃主题切换滑块 ===== */
.theme-glass-toggle {
  position: fixed;
  top: 9px;
  right: 20px;        /* 改为 20px，避开 app-nav 的菜单 */
  z-index: 999;
  pointer-events: auto;
}

.toggle-track {
  position: relative;
  width: 200px;
  height: 34px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.25);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
  display: flex;
  align-items: center;
  padding: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.toggle-track:hover {
  background: rgba(255, 255, 255, 0.25);
  box-shadow: 0 4px 32px rgba(102, 126, 234, 0.15);
  border-color: rgba(255, 255, 255, 0.4);
}

.toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 30px;
  height: 28px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transition: left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 1px solid rgba(255, 255, 255, 0.5);
}

.thumb-icon {
  font-size: 15px;
  line-height: 1;
}

.toggle-segments {
  display: flex;
  width: 100%;
  justify-content: space-around;
  padding: 0 6px;
  z-index: 1;
}

.seg-item {
  font-size: 14px;
  line-height: 1;
  padding: 2px 0;
  cursor: pointer;
  transition: transform 0.2s ease, opacity 0.2s ease;
  opacity: 0.5;
  flex: 1;
  text-align: center;
}

.seg-item:hover {
  transform: scale(1.25);
  opacity: 0.8;
}

.seg-item.active {
  opacity: 1;
  transform: scale(1.2);
}

/* ===== 调整 Docsify 默认导航位置 ===== */
/* .app-nav {
  left: 220px !important;      放在 Logo 右侧

  top: 12px !important;
}
.app-nav.no-badge {

/* ===== 导航菜单样式 ===== */
.custom-nav-menu {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: 20px;
  pointer-events: auto;
  flex: 1;
}

.nav-item {
  padding: 6px 12px;
  font-size: 14px;
  font-weight: 500;
  color: inherit;
  text-decoration: none;
  border-radius: 8px;
  transition: background 0.2s ease, opacity 0.2s ease;
  cursor: pointer;
  white-space: nowrap;
  opacity: 0.75;
}

.nav-item:hover {
  background: rgba(255, 255, 255, 0.15);
  opacity: 1;
}

.nav-dropdown {
  position: relative;
  pointer-events: auto;
}

.drop-trigger {
  user-select: none;
}

.drop-menu {
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 6px;
  min-width: 110px;
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  padding: 5px;
  opacity: 0;
  visibility: hidden;
  transform: translateY(6px);
  transition: all 0.25s ease;
  z-index: 100;
}

.nav-dropdown:hover .drop-menu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.drop-menu a {
  display: block;
  padding: 7px 12px;
  font-size: 13px;
  color: inherit;
  text-decoration: none;
  border-radius: 6px;
  transition: background 0.15s ease;
}

.drop-menu a:hover {
  background: rgba(102, 126, 234, 0.12);
}

/* 隐藏 docsify 默认的旧导航 */
.app-nav,
.app-nav.no-badge {
  display: none !important;
}


</style>
</head>
<body>
  <div id="app"></div>

  <!-- 自定义顶部导航栏--logo样式 -->
  <div class="custom-navbar">
    <div class="nav-logo">
      <img src="images/blog.png" alt="Logo" class="nav-logo-img">
      <span class="nav-logo-text">ThesummerBlog</span>
    </div>

      <!-- 导航菜单 -->
  <div class="custom-nav-menu">
    <a class="nav-item" href="#/">🏠 首页</a>

    <!-- <div class="nav-dropdown">
      <span class="nav-item drop-trigger">SchoolNetWork ▾</span>
      <div class="drop-menu">
        <a href="#/SchoolNetWork/First.md">A</a>
        <a href="#/SchoolNetWork/Second.md">B</a>
      </div>
    </div>

    <div class="nav-dropdown">

      <div class="drop-menu">
        <a href="#/Ownermd/a.md">A</a>
        <a href="#/Ownermd/b.md">B</a>
      </div>
    </div> -->
  </div>

  </div>

  <!-- 玻璃主题切换滑块 -->
  <div class="theme-glass-toggle" id="themeGlassToggle">
    <div class="toggle-track">
      <div class="toggle-thumb" id="toggleThumb">
        <span class="thumb-icon" id="thumbIcon">🌿</span>
      </div>
      <div class="toggle-segments" id="toggleSegments">
        <span class="seg-item" data-theme="vue">🌿</span>
        <span class="seg-item" data-theme="dark">🌙</span>
        <span class="seg-item" data-theme="pure">💧</span>
        <span class="seg-item" data-theme="dolphin">🐬</span>
        <span class="seg-item" data-theme="buble">🫧</span>
      </div>
    </div>

  </div>

    <!-- Loading 遮罩 -->
  <div id="loading-overlay">
    <!-- 加载动画  圆圈进度条样式 -->
    <div class="loader-spinner"></div>
    <!-- 加载动画 -->
    <div class="loader-bar"><div class="bar"></div></div>
    <div class="loader-text">LOADING</div>
  </div>
  <script>
    window.$docsify = {   
      name: '',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      coverpage: true,
      onlyCover: true,//只显示封面
      loadNavbar: true,
      plugins: [
        function (hook) {
          // 在每次路由切换完成后执行
        hook.doneEach(function () {
        setTimeout(() => {
          document.getElementById('loading-overlay')?.classList.add('hide');
        }, 300);// 延迟 300ms 隐藏遮罩，确保内容加载完成
      });

        hook.beforeEach(function(content) {
          const main = document.getElementById('main');
          if (main) {
            main.classList.add('fade-out');
            setTimeout(() => main.classList.remove('fade-out'), 500);
        }
        return content;
      });
        hook.doneEach(function() {
          const main = document.getElementById('main');
          if (main) {
          main.classList.add('fade-in');
          setTimeout(() => main.classList.remove('fade-in'), 500);
          }
      });
      },
     
      ]
};

    (function() {
      // 恢复保存的主题
      var saved = localStorage.getItem('docsify-theme');
      if (saved) {
        document.getElementById('theme-style').href = '//cdn.jsdelivr.net/npm/docsify/themes/' + saved + '.css';

      }


      // ===== 玻璃滑块 + 主题切换逻辑 =====
      (function() {
        var themes = ['vue', 'dark', 'pure', 'dolphin', 'buble'];
        var icons  = ['🌿', '🌙', '💧', '🐬', '🫧'];

        // 恢复保存的主题
        var saved = localStorage.getItem('docsify-theme');
        var currentIndex = saved ? themes.indexOf(saved) : 0;
        if (currentIndex < 0) currentIndex = 0;

        var thumb = document.getElementById('toggleThumb');
        var thumbIcon = document.getElementById('thumbIcon');
        var segments = document.querySelectorAll('.seg-item');
        var track = document.querySelector('.toggle-track');

        function setTheme(index) {
          currentIndex = index;
          var theme = themes[index];

          // 移动 thumb
          var firstSeg = segments[0];
          var lastSeg = segments[segments.length - 1];
          if (firstSeg && lastSeg) {
            var trackRect = track.getBoundingClientRect();
            var firstRect = firstSeg.getBoundingClientRect();
            var lastRect = lastSeg.getBoundingClientRect();
            var firstCenter = (firstRect.left + firstRect.right) / 2 - trackRect.left;
            var lastCenter = (lastRect.left + lastRect.right) / 2 - trackRect.left;
            var step = (lastCenter - firstCenter) / (segments.length - 1);
            thumb.style.left = (firstCenter - 15 + step * index) + 'px';
          }

          // 更新图标
          thumbIcon.textContent = icons[index];

          // 更新 active
          segments.forEach(function(el, i) {
            el.classList.toggle('active', i === index);
          });

          // 切换主题
          document.getElementById('theme-style').href = '//cdn.jsdelivr.net/npm/docsify/themes/' + theme + '.css';
          localStorage.setItem('docsify-theme', theme);
          document.body.classList.remove('theme-vue', 'theme-dark', 'theme-pure', 'theme-dolphin', 'theme-buble');
          document.body.classList.add('theme-' + theme);
        }

        // 等待 DOM 渲染完成再初始化位置
        setTimeout(function() {
          setTheme(currentIndex);
        }, 500);

        // 点击滑块事件
        track.addEventListener('click', function(e) {
          var seg = e.target.closest('.seg-item');
          if (seg) {
            var idx = Array.from(segments).indexOf(seg);
            setTheme(idx);
            return;
          }
          // 点击空白区域切到下一个主题
          setTheme((currentIndex + 1) % themes.length);
        });
      })();

      
      // 封面页控制 — 隐藏导航菜单
      function toggleTopBar() {
        var isCover = !location.hash || location.hash === '#/';
        var bar = document.querySelector('.custom-navbar');
        var slider = document.querySelector('.theme-glass-toggle');
        var display = isCover ? 'none' : '';
        if (bar) bar.style.display = display;
        if (slider) slider.style.display = display;
        // 从封面切到子页面时，重新计算滑块位置
        if (!isCover) {
          var savedTheme = localStorage.getItem('docsify-theme') || 'vue';
          var idx = ['vue','dark','pure','dolphin','buble'].indexOf(savedTheme);
          if (idx >= 0) {
            document.querySelectorAll('.seg-item').forEach(function(el, i) {
              el.classList.toggle('active', i === idx);
            });
          }
        }
      }
      window.addEventListener('hashchange', toggleTopBar);
      toggleTopBar();


      // 封面页控制
      // function toggleNav() {
      //   var isCover = !location.hash || location.hash === '#/';
      //   var nav = document.querySelector('.app-nav');
      //   if (nav) {
      //     if (isCover) {
      //       nav.style.display = 'none';
      //     } else {
      //       nav.style.display = '';
      //     }
      //   }
      // }
      // window.addEventListener('hashchange', toggleNav);
      // toggleNav();
    })();



  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
